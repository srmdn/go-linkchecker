name: Bug Report
description: Report a bug or regression
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: v0.1.0 or main@abc1234
    validations:
      required: true
  - type: input
    id: go_version
    attributes:
      label: Go Version
      placeholder: "go version go1.22 linux/amd64"
    validations:
      required: true
